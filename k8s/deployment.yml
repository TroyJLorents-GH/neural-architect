apiVersion: apps/v1
kind: Deployment
metadata:
  name: neural-architect
  labels:
    app: neural-architect
spec:
  replicas: 2
  selector:
    matchLabels:
      app: neural-architect
  template:
    metadata:
      labels:
        app: neural-architect
    spec:
      containers:
        - name: neural-architect
          image: neuralarchitectacr.azurecr.io/neural-architect:latest
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: neural-architect-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: neural-architect
spec:
  type: LoadBalancer
  selector:
    app: neural-architect
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
